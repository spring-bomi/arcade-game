<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>맥도날드 카오스 키친 XR - 도형 형식 조리</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif; 
            background-color: #0a0a0a; 
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(255, 199, 44, 0.1) 0%, transparent 60%),
                radial-gradient(circle at 85% 15%, rgba(255, 255, 255, 0.05) 0%, transparent 40%);
            color: white; overflow: hidden; 
        }

        body::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(#FFC72C 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.1; z-index: -1; pointer-events: none;
        }
        
        header { position: absolute; top: 0; left: 0; width: 100%; padding: 20px 0; text-align: center; z-index: 100; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); pointer-events: none; }
        .logo-text { color: #fff; font-size: 24px; font-weight: bold; margin: 0; letter-spacing: 1px; }
        .logo-text span { color: #FFC72C; font-size: 30px; }
        
        .step-indicator { display: flex; justify-content: center; gap: 80px; margin-top: 80px; position: relative; z-index: 100; width: 100%; }
        .step { display: flex; flex-direction: column; align-items: center; color: #777; font-size: 14px; font-weight: bold; position: relative; }
        .step::after { content: ''; position: absolute; top: 25px; left: 60px; width: 80px; height: 2px; background: #555; z-index: -1; }
        .step:last-child::after { display: none; }
        .step .icon { width: 50px; height: 50px; background: #222; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin-bottom: 8px; border: 3px solid #444; font-size: 20px; transition: all 0.3s; }
        .step.active { color: #FFC72C; }
        .step.active .icon { background: #fff; border-color: #FFC72C; color: #000; box-shadow: 0 0 15px rgba(255,199,44,0.6); transform: scale(1.1); }
        
        .video-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        video { display: none; }
        canvas#output_canvas { display: block; transform: scaleX(-1); width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; opacity: 0.5; } 
        #game_canvas { transform: none; z-index: 50; position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        #ui-layer { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 700px; max-width: 90%; z-index: 100; display: none; pointer-events: none;}
        .mission-box { background: rgba(10, 10, 10, 0.9); border: 2px solid #FFC72C; color: #fff; padding: 30px; border-radius: 20px; text-align: center; backdrop-filter: blur(10px); box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        #mission-title { font-size: 18px; color: #FFC72C; margin-bottom: 10px; font-weight: bold; }
        #mission-text { font-size: 22px; font-weight: bold; line-height: 1.4; transition: color 0.3s; }
        .progress-bar { width: 100%; height: 15px; background: #333; border-radius: 10px; margin-top: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #FFC72C, #ff9100); width: 0%; transition: width 0.2s; }
        
        .overlay-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); }
        #start-screen { background: inherit; } 
        
        .start-content { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .start-content h2 { color: #fff; font-size: 48px; margin: 0 0 20px 0; text-shadow: 0 0 20px rgba(255,199,44,0.5); line-height: 1.3; }
        
        .btn-primary { padding: 20px 40px; background-color: #FFC72C; color: #111; font-size: 22px; font-weight: bold; border: none; border-radius: 50px; cursor: pointer; transition: transform 0.1s, box-shadow 0.2s; box-shadow: 0 5px 25px rgba(255,199,44,0.3); pointer-events: auto;}
        .btn-primary:hover { box-shadow: 0 8px 30px rgba(255,199,44,0.5); }
        .btn-primary:active { transform: scale(0.95); }
        
        .card { background: linear-gradient(135deg, #FFC72C 0%, #e69500 100%); width: 400px; padding: 30px; border-radius: 30px; text-align: center; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.8); border: 5px solid #fff; margin-bottom: 30px; }
        .card h3 { color: #111; font-size: 28px; margin: 0 0 10px 0; }
        .level-badge { position: absolute; top: -20px; right: -20px; background: #DA291C; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 18px; border: 4px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        
        #unboxing-area { display: flex; flex-direction: column; align-items: center; width: 100%; pointer-events: auto;}
        #happy-meal-container { position: relative; width: 160px; height: 160px; margin-top: 60px; }
        .box-body { width: 160px; height: 160px; background: #DA291C; border-radius: 10px 10px 20px 20px; position: absolute; top:0; left:0; display: flex; justify-content: center; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8); z-index: 2; border: 2px solid #b31b12; }
        .box-logo { color: #FFC72C; font-size: 80px; font-weight: bold; font-family: sans-serif; }
        .box-lid { width: 160px; height: 60px; background: #DA291C; border-radius: 40px 40px 0 0; position: absolute; top: -60px; left: -2px; transform-origin: bottom center; transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.5s; z-index: 3; border: 2px solid #b31b12; border-bottom: none; }
        .box-lid::before { content: ''; width: 40px; height: 30px; border: 8px solid #FFC72C; border-radius: 50% 50% 0 0; position: absolute; top: -38px; left: 50px; border-bottom: none; }
        .box-lid.open { transform: rotateX(180deg); opacity: 0; }
        .glow { position: absolute; top: -70px; left: -70px; width: 300px; height: 300px; background: radial-gradient(circle, rgba(255,199,44,0.9) 0%, rgba(255,199,44,0) 70%); opacity: 0; transition: opacity 0.8s; pointer-events: none; z-index: 1; }
        .glow.show { opacity: 1; }
        .toy { font-size: 80px; position: absolute; top: 10px; left: 40px; opacity: 0; transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform: translateY(50px) scale(0.1); z-index: 4; }
        .toy.pop { opacity: 1; transform: translateY(-110px) scale(1.2) rotate(10deg); }
    </style>
</head>
<body>

    <header><h1 class="logo-text"><span>M</span> 맥도날드 도형 키친</h1></header>

    <div class="step-indicator" id="step-indicator" style="display: none;">
        <div class="step active" id="step1"><div class="icon">🏠</div>The Shift</div>
        <div class="step" id="step2"><div class="icon">🍳</div>Rush Hour</div>
        <div class="step" id="step3"><div class="icon">🍔</div>The Result</div>
        <div class="step" id="step4"><div class="icon">🎁</div>Unboxing</div>
    </div>

    <div class="video-container" id="video-container">
        <video id="input_video" playsinline></video>
        <canvas id="output_canvas"></canvas>
        <canvas id="game_canvas"></canvas>
    </div>

    <div id="ui-layer">
        <div class="mission-box">
            <div id="mission-title">Rush Hour : 패티 굽기</div>
            <div id="mission-text">도형 패티를 구워주세요!</div>
            <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        </div>
    </div>

    <div id="start-screen" class="overlay-screen">
        <div class="start-content">
            <h2>오늘의 미션을 도형으로 조리하고<br>나만의 <strong>디지털 해피밀</strong>을 언박싱하세요!</h2>
            <div style="display: flex; gap: 20px; margin-top: 30px;">
                <button class="btn-primary" onclick="startGame('camera')" id="start-btn-cam">카메라(AR) 모드 시작</button>
                <button class="btn-primary" onclick="startGame('mouse')" id="start-btn-mouse" style="background-color: #333; color: #fff; border: 2px solid #555; box-shadow: none;">마우스 모드 시작</button>
            </div>
            <p style="color: #888; margin-top: 20px; font-size: 14px;">(도형 형식 조리 버전이므로 이미지 로딩을 대기하지 않습니다.)</p>
        </div>
    </div>

    <div id="result-screen" class="overlay-screen" style="display: none;">
        <h2 style="color: white; margin-bottom: 20px; font-size: 36px; text-shadow: 2px 2px 10px rgba(0,0,0,0.8);">🎉 오늘 맥도날드 취업 성공!</h2>
        <div class="card">
            <div class="level-badge" id="result-level">Lv.Max</div>
            <h3 id="result-title">전설의 매니저</h3>
            <p style="color: #333; font-size: 14px; margin-bottom: 10px;">크루 페르소나 생성 완료</p>
            <div id="result-icon" style="font-size: 70px; margin-bottom: 10px;">🧑‍🍳</div> 
            <p id="result-desc" style="font-weight: bold; color: #111; font-size: 16px;">"빠르고 정확하게! 완벽한 서빙!"</p>
        </div>
        <div id="unboxing-area">
            <p id="unboxing-text" style="color: #FFC72C; font-size: 22px; font-weight: bold; margin-bottom: 15px; text-shadow: 1px 1px 5px rgba(0,0,0,0.8);">해피밀 박스를 오픈하세요!</p>
            <div class="progress-bar" id="unboxing-progress-container" style="width: 300px; margin-bottom: 20px;">
                <div id="unboxing-progress-fill" class="progress-fill"></div>
            </div>
            <div id="happy-meal-container">
                <div class="glow"></div>
                <div class="box-lid"></div>
                <div class="box-body"><div class="box-logo">M</div></div>
                <div class="toy" id="random-toy">🚗</div>
            </div>
            <div id="result-toy-info" style="display: none; background: #fff; padding: 15px 30px; border-radius: 30px; margin-top: 30px; color: #DA291C; font-weight: bold; font-size: 24px; box-shadow: 0 5px 15px rgba(0,0,0,0.5);">
                획득한 토이: <span id="result-toy-text">🚗</span>
            </div>
            <button id="restart-btn" class="btn-primary" style="margin-top: 30px; background-color: #fff; display: none;" onclick="location.reload()">처음으로</button>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const gameCanvas = document.getElementById('game_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const gameCtx = gameCanvas.getContext('2d');
        
        function resizeCanvas() {
            canvasElement.width = window.innerWidth; canvasElement.height = window.innerHeight;
            gameCanvas.width = window.innerWidth; gameCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        let playMode = ''; 
        let currentState = 0; 
        let progress = 0;
        let particles = [];
        let camera;
        let isFirstPhaseDone = false;
        let initialPalmDirection = null;

        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let isMouseDown = false;
        let mouseFlipReady = false;
        let mouseMoveDist = 0;

        const fixedSesameSeeds = [];
        const numSesameSeeds = 15;

        function generateFixedSesameSeeds() {
            if (fixedSesameSeeds.length > 0) return; 
            for (let i = 0; i < numSesameSeeds; i++) {
                fixedSesameSeeds.push({
                    x: Math.random() - 0.5, 
                    y: Math.random() * 0.4 - 0.35, 
                    angle: Math.random() * Math.PI 
                });
            }
        }

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX; mouseY = e.clientY;
            if(currentState === 4) mouseMoveDist += Math.abs(e.movementX) + Math.abs(e.movementY); 
        });
        window.addEventListener('mousedown', () => isMouseDown = true);
        window.addEventListener('mouseup', () => isMouseDown = false);

        const burgerStackState = { 
            patty: false,    
            cheese: false,   
            tomato: false,   
            lettuce: false,  
            garnish: false,  
            topBun: false    
        };

        const personas = [ 
            { title: '전설의 매니저', desc: '"빠르고 정확하게!"', icon: '🧑‍💼', level: 'Lv.Max' }, 
            { title: '미소 천사 알바생', desc: '"주문하시겠어요? 😊"', icon: '👼', level: 'Lv.1' },
            { title: '패티 마스터', desc: '"육즙을 가두는 그릴링!"', icon: '🍔', level: 'Lv.3' },
            { title: '스피드 러너', desc: '"누구보다 빠르게!"', icon: '⚡', level: 'Lv.4' }
        ];
        const toys = ['🚗', '🧸', '🤖', '🎸', '🐶', '🦄', '🦖'];

        const fixedIngredientWidth = 160; 

        function drawCanvasIngredient(ctx, type, cx, cy, width) {
            ctx.save();
            ctx.translate(cx, cy);
            
            ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
            ctx.shadowBlur = 10;
            ctx.shadowOffsetY = 4;

            ctx.beginPath();
            if (type === 'bun_bottom') {
                ctx.fillStyle = '#E2A75F'; 
                ctx.roundRect(-width/2, -20, width, 40, [5, 5, 20, 20]); ctx.fill();
            } 
            else if (type === 'patty') {
                ctx.fillStyle = '#5E3A21'; 
                ctx.roundRect(-width/2 * 0.95, -15, width * 0.95, 30, 8); ctx.fill();
            } 
            else if (type === 'cheese') {
                ctx.fillStyle = '#FFC72C'; 
                ctx.roundRect(-width/2 * 0.98, -10, width * 0.98, 18, 5); ctx.fill();
            }
            else if (type === 'tomato') {
                ctx.fillStyle = '#DA291C'; 
                ctx.roundRect(-width/2 * 0.92, -12, width * 0.92, 22, 10); ctx.fill();
            }
            else if (type === 'lettuce') {
                ctx.fillStyle = '#4CAF50'; 
                ctx.roundRect(-width/2 * 1.05, -10, width * 1.05, 20, 10); ctx.fill();
            }
            else if (type === 'garnish_shapes') {
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#689F38'; 
                for(let i=0; i<3; i++) {
                    ctx.beginPath();
                    ctx.ellipse(-width/2 + (width/3)*(i+0.5), -5, 20, 10, (Math.random()-0.5)*0.5, 0, Math.PI*2); ctx.fill();
                }
                ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.lineWidth = 6;
                for(let i=0; i<2; i++) {
                    ctx.beginPath();
                    ctx.ellipse(-width/4 + (width/2)*i, -5, 30, 12, (Math.random()-0.5)*0.3, 0, Math.PI*2); ctx.stroke();
                }
            } 
            else if (type === 'bun_top') {
                ctx.fillStyle = '#E2A75F'; 
                ctx.roundRect(-width/2, -35, width, 70, [35, 35, 5, 5]); ctx.fill();
                
                ctx.fillStyle = '#FFC72C'; ctx.shadowBlur = 0;
                generateFixedSesameSeeds(); 
                for(const seed of fixedSesameSeeds) {
                    ctx.beginPath();
                    ctx.ellipse(seed.x * width, seed.y * 70, 2, 4, seed.angle, 0, Math.PI*2); ctx.fill();
                }
            }
            ctx.restore();
        }

        function updateStepUI(stepNumber) {
            document.querySelectorAll('.step').forEach((el, index) => {
                if(index <= stepNumber) el.classList.add('active'); else el.classList.remove('active');
            });
        }

        function startGame(mode) {
            playMode = mode;
            generateFixedSesameSeeds(); 
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('step-indicator').style.display = 'flex';
            document.getElementById('ui-layer').style.display = 'block';
            currentState = 1; updateStepUI(1);

            if (playMode === 'camera') {
                document.getElementById('mission-text').innerText = "한 손으로 도형 빵을 받치고, 반대쪽 손바닥을 뒤집어 패티를 구워주세요!";
                camera = new Camera(videoElement, { onFrame: async () => { await hands.send({image: videoElement}); }, width: 1280, height: 720 });
                camera.start();
            } else if (playMode === 'mouse') {
                document.getElementById('output_canvas').style.display = 'none';
                document.getElementById('mission-text').innerText = "도형 패티를 클릭하고 꾹 유지하여 구워주세요!";
                requestAnimationFrame(mouseGameLoop); 
            }
        }

        function getDistance(p1, p2) { return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2)); }
        function getPalmFacingDirection(landmarks) { const p0 = landmarks[0], p5 = landmarks[5], p17 = landmarks[17]; return ((p5.x - p0.x) * (p17.y - p0.y) - (p5.y - p0.y) * (p17.x - p0.x)) > 0; }

        function drawParticles() {
            if (currentState === 2) { 
                gameCtx.font = "40px Arial"; gameCtx.textAlign = "center"; gameCtx.textBaseline = "middle";
                for (let i = 0; i < particles.length; i++) {
                    let p = particles[i]; gameCtx.fillText(p.type, p.x, p.y);
                    p.y += p.speed; if (p.y > gameCanvas.height) particles.splice(i, 1);
                }
            }
        }

        // ==========================================
        // [카메라 모드] 전용 로직
        // ==========================================
        function drawARBurgerMarkers(leftHand, rightHand) {
            gameCtx.clearRect(0, 0, gameCanvas.width, gameCanvas.height);
            drawParticles();

            if (currentState >= 1 && currentState <= 3) {
                if (leftHand) {
                    const lx = (1 - leftHand[9].x) * gameCanvas.width, ly = leftHand[9].y * gameCanvas.height;
                    const bWidth = fixedIngredientWidth;
                    const h_overlap = 10; 

                    let currentY = ly + 20; 
                    drawCanvasIngredient(gameCtx, 'bun_bottom', lx, currentY, bWidth);
                    
                    if (burgerStackState.patty) { 
                        currentY = currentY - 20 - 15 + h_overlap; 
                        drawCanvasIngredient(gameCtx, 'patty', lx, currentY, bWidth); 
                    }
                    if (burgerStackState.cheese) { 
                        currentY = currentY - 15 - 9 + h_overlap * 0.9; 
                        drawCanvasIngredient(gameCtx, 'cheese', lx, currentY, bWidth); 
                    }
                    if (burgerStackState.tomato) { 
                        currentY = currentY - 9 - 11 + h_overlap * 0.8; 
                        drawCanvasIngredient(gameCtx, 'tomato', lx, currentY, bWidth); 
                    }
                    if (burgerStackState.lettuce) { 
                        currentY = currentY - 11 - 10 + h_overlap * 0.7; 
                        drawCanvasIngredient(gameCtx, 'lettuce', lx, currentY, bWidth); 
                    }
                    if (burgerStackState.garnish) { 
                        currentY = currentY - 10 - 5 + h_overlap * 0.5;
                        drawCanvasIngredient(gameCtx, 'garnish_shapes', lx, currentY, bWidth); 
                    }
                }

                if (currentState === 3 && rightHand) {
                    const rx = (1 - rightHand[9].x) * gameCanvas.width, ry = rightHand[9].y * gameCanvas.height;
                    const bWidth = fixedIngredientWidth;
                    drawCanvasIngredient(gameCtx, 'bun_top', rx, ry - 20, bWidth);
                }
            }
        }

        function onResults(results) {
            if(playMode !== 'camera' || currentState === 0 || currentState === 5) return;

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            let leftHandInfo = null, rightHandInfo = null;

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                results.multiHandLandmarks.forEach((landmarks, index) => {
                    const label = results.multiHandedness[index].label;
                    if(label === 'Left') leftHandInfo = landmarks; else if(label === 'Right') rightHandInfo = landmarks;
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#FFC72C', lineWidth: 4});
                    drawLandmarks(canvasCtx, landmarks, {color: '#DA291C', lineWidth: 2, radius: 5});
                });
            }
            
            drawARBurgerMarkers(leftHandInfo, rightHandInfo);

            const actionHand = rightHandInfo || (results.multiHandLandmarks.length > 0 ? results.multiHandLandmarks[0] : null);
            const hand1 = results.multiHandLandmarks[0];
            const hand2 = results.multiHandLandmarks.length > 1 ? results.multiHandLandmarks[1] : null;

            if (currentState === 1 && actionHand) {
                if (getDistance(actionHand[0], actionHand[12]) > 0.3) {
                    const currentFacing = getPalmFacingDirection(actionHand);
                    if (!isFirstPhaseDone) {
                        progress += 1.5;
                        if (progress >= 50) { 
                            progress = 50; isFirstPhaseDone = true; initialPalmDirection = currentFacing; 
                            document.getElementById('mission-text').innerText = "반대쪽 손바닥을 뒤집어 반대쪽을 구워주세요!"; 
                            document.getElementById('mission-text').style.color = "#FFC72C";
                        }
                    } else {
                        if (currentFacing !== initialPalmDirection) progress += 1.5;
                        if (progress >= 100) { 
                            currentState = 2; progress = 0; 
                            burgerStackState.patty = true; 
                            burgerStackState.cheese = true; 
                            burgerStackState.tomato = true; 
                            burgerStackState.lettuce = true;

                            document.getElementById('mission-title').innerText = "Rush Hour : 가니쉬"; 
                            document.getElementById('mission-text').innerText = "오른손 엄지와 검지를 비벼 양파와 피클 시각 효과를 내세요!"; 
                            document.getElementById('mission-text').style.color = "#fff";
                        }
                    }
                    document.getElementById('progress-fill').style.width = `${progress}%`;
                }
            }
            else if (currentState === 2) {
                for (const landmarks of results.multiHandLandmarks) {
                    if (getDistance(landmarks[4], landmarks[8]) < 0.05) { 
                        progress += 0.8; document.getElementById('progress-fill').style.width = `${progress}%`;
                        const xPos = (1 - landmarks[8].x) * gameCanvas.width, yPos = landmarks[8].y * gameCanvas.height;
                        particles.push({ x: xPos + (Math.random() * 80 - 40), y: yPos, speed: Math.random() * 6 + 4, type: Math.random() > 0.5 ? '🧅' : '🥒' });
                        
                        // 뿌리기 효과 완료 시, 중간 올리기 과정 생략하고 바로 가니쉬 스택
                        if (progress >= 100) { 
                            currentState = 3; progress = 0; particles = []; 
                            burgerStackState.garnish = true; 
                            document.getElementById('mission-title').innerText = "Rush Hour : 버거 완성"; 
                            document.getElementById('mission-text').innerText = "도형 빵들을 가운데로 모아 버거를 합치세요!"; 
                            document.getElementById('progress-fill').style.width = "0%"; 
                        }
                    }
                }
            }
            else if (currentState === 3) {
                if (leftHandInfo && rightHandInfo) {
                    const markerDistance = getDistance(leftHandInfo[9], rightHandInfo[9]); 
                    if (markerDistance < 0.15) { 
                        progress += 4; document.getElementById('progress-fill').style.width = `${progress}%`;
                        
                        if (progress >= 100) {
                            currentState = 4; progress = 0; burgerStackState.topBun = true;
                            gameCtx.clearRect(0, 0, gameCanvas.width, gameCanvas.height); 
                            
                            const randomPersona = personas[Math.floor(Math.random() * personas.length)];
                            document.getElementById('result-level').innerText = randomPersona.level;
                            document.getElementById('result-title').innerText = randomPersona.title;
                            document.getElementById('result-icon').innerText = randomPersona.icon;
                            document.getElementById('result-desc').innerText = randomPersona.desc;

                            setTimeout(() => {
                                updateStepUI(4);
                                document.getElementById('ui-layer').style.display = 'none';
                                document.getElementById('result-screen').style.display = 'flex';
                            }, 500); 
                        }
                    }
                }
            }
            else if (currentState === 4) {
                if (hand1 && hand2) {
                    document.getElementById('unboxing-text').innerText = "양손을 쫙 벌려 도형 박스를 오픈하세요!"; 
                    document.getElementById('unboxing-text').style.color = "#FFC72C";
                    
                    const handsDistance = getDistance(hand1[0], hand2[0]);
                    if (handsDistance > 0.35) {
                        progress += 3; document.getElementById('unboxing-progress-fill').style.width = `${progress}%`;
                        if (progress >= 100) triggerUnboxing();
                    }
                } else {
                    document.getElementById('unboxing-text').innerText = "카메라에 양손이 모두 보여야 합니다!";
                    document.getElementById('unboxing-text').style.color = "#DA291C";
                }
            }
            canvasCtx.restore();
        }

        // ==========================================
        // [마우스 모드] 전용 로직
        // ==========================================
        function drawMouseModeBurger() {
            gameCtx.clearRect(0, 0, gameCanvas.width, gameCanvas.height);
            drawParticles();

            if (currentState >= 1 && currentState <= 3) {
                const lx = gameCanvas.width / 2;
                const ly = gameCanvas.height * 0.7;
                const bWidth = fixedIngredientWidth;
                const h_overlap = 10;

                let currentY = ly;
                drawCanvasIngredient(gameCtx, 'bun_bottom', lx, currentY, bWidth);

                if (burgerStackState.patty) {
                    currentY = currentY - 20 - 15 + h_overlap;
                    drawCanvasIngredient(gameCtx, 'patty', lx, currentY, bWidth);
                }
                if (burgerStackState.cheese) {
                    currentY = currentY - 15 - 9 + h_overlap * 0.9;
                    drawCanvasIngredient(gameCtx, 'cheese', lx, currentY, bWidth);
                }
                if (burgerStackState.tomato) {
                    currentY = currentY - 9 - 11 + h_overlap * 0.8;
                    drawCanvasIngredient(gameCtx, 'tomato', lx, currentY, bWidth);
                }
                if (burgerStackState.lettuce) {
                    currentY = currentY - 11 - 10 + h_overlap * 0.7;
                    drawCanvasIngredient(gameCtx, 'lettuce', lx, currentY, bWidth);
                }
                if (burgerStackState.garnish) {
                    currentY = currentY - 10 - 5 + h_overlap * 0.5;
                    drawCanvasIngredient(gameCtx, 'garnish_shapes', lx, currentY, bWidth); 
                }

                if (currentState === 1 && !burgerStackState.patty) {
                    drawCanvasIngredient(gameCtx, 'patty', mouseX, mouseY, bWidth);
                } else if (currentState === 3 && !burgerStackState.topBun) {
                    drawCanvasIngredient(gameCtx, 'bun_top', mouseX, mouseY, bWidth);
                }
            }
        }

        function mouseGameLoop() {
            if (playMode !== 'mouse' || currentState === 0 || currentState === 5) return;

            drawMouseModeBurger();

            if (currentState === 1) {
                if (isMouseDown) {
                    if (!isFirstPhaseDone) {
                        progress += 1.5;
                        if (progress >= 50) {
                            progress = 50; isFirstPhaseDone = true;
                            document.getElementById('mission-text').innerText = "잘했어요! 클릭을 뗐다가 다시 클릭하여 반대쪽을 구워주세요!";
                            document.getElementById('mission-text').style.color = "#FFC72C";
                        }
                    } else if (mouseFlipReady) {
                        progress += 1.5;
                        if (progress >= 100) {
                            currentState = 2; progress = 0; 
                            burgerStackState.patty = true; 
                            burgerStackState.cheese = true; 
                            burgerStackState.tomato = true; 
                            burgerStackState.lettuce = true;

                            document.getElementById('mission-title').innerText = "Rush Hour : 가니쉬";
                            document.getElementById('mission-text').innerText = "화면을 꾹 누른 채 마우스를 움직여 양파와 피클 시각 효과를 내세요!";
                            document.getElementById('mission-text').style.color = "#fff";
                            document.getElementById('progress-fill').style.width = "0%";
                        }
                    }
                } else {
                    if (isFirstPhaseDone && !mouseFlipReady) mouseFlipReady = true; 
                }
                document.getElementById('progress-fill').style.width = `${progress}%`;
            }
            else if (currentState === 2) {
                if (isMouseDown) {
                    progress += 0.8;
                    document.getElementById('progress-fill').style.width = `${progress}%`;
                    particles.push({ x: mouseX + (Math.random() * 80 - 40), y: mouseY, speed: Math.random() * 6 + 4, type: Math.random() > 0.5 ? '🧅' : '🥒' });

                    // 뿌리기 효과 완료 시, 중간 올리기 과정 생략하고 바로 가니쉬 스택 & 3단계 돌입
                    if (progress >= 100) {
                        currentState = 3; progress = 0; particles = []; 
                        burgerStackState.garnish = true; 
                        document.getElementById('mission-title').innerText = "Rush Hour : 버거 완성";
                        document.getElementById('mission-text').innerText = "마우스를 중앙 하단으로 드래그하여 윗 빵 도형을 덮으세요!";
                        document.getElementById('progress-fill').style.width = "0%";
                    }
                }
            }
            else if (currentState === 3) {
                const lx = gameCanvas.width / 2;
                const ly = gameCanvas.height * 0.7;
                let topY = ly;
                if(burgerStackState.garnish) topY -= 50; 
                
                const dist = getDistance({x: lx, y: topY}, {x: mouseX, y: mouseY});

                if (dist < 80) { 
                    progress += 4;
                    document.getElementById('progress-fill').style.width = `${progress}%`;
                    if (progress >= 100) {
                        currentState = 4; progress = 0; burgerStackState.topBun = true;
                        gameCtx.clearRect(0, 0, gameCanvas.width, gameCanvas.height);

                        const randomPersona = personas[Math.floor(Math.random() * personas.length)];
                        document.getElementById('result-level').innerText = randomPersona.level;
                        document.getElementById('result-title').innerText = randomPersona.title;
                        document.getElementById('result-icon').innerText = randomPersona.icon;
                        document.getElementById('result-desc').innerText = randomPersona.desc;

                        setTimeout(() => {
                            updateStepUI(4);
                            document.getElementById('ui-layer').style.display = 'none';
                            document.getElementById('result-screen').style.display = 'flex';
                            document.getElementById('unboxing-text').innerText = "마우스를 좌우로 마구 흔들어 박스를 오픈하세요!";
                        }, 500);
                    }
                } else {
                    progress -= 1; if(progress < 0) progress = 0;
                    document.getElementById('progress-fill').style.width = `${progress}%`;
                }
            }
            else if (currentState === 4) {
                if (mouseMoveDist > 5) { 
                    progress += (mouseMoveDist * 0.4); 
                    mouseMoveDist = 0; 
                    if(progress > 100) progress = 100;
                    document.getElementById('unboxing-progress-fill').style.width = `${progress}%`;

                    if (progress >= 100) triggerUnboxing();
                }
            }

            requestAnimationFrame(mouseGameLoop);
        }

        function triggerUnboxing() {
            currentState = 5;
            document.querySelector('.box-lid').classList.add('open'); 
            document.querySelector('.glow').classList.add('show');
            
            const selectedToy = toys[Math.floor(Math.random() * toys.length)]; 
            const toyEl = document.getElementById('random-toy'); 
            toyEl.innerText = selectedToy; 
            toyEl.classList.add('pop');
            
            document.getElementById('result-toy-text').innerText = selectedToy;
            setTimeout(() => { 
                document.getElementById('unboxing-progress-container').style.display = 'none';
                document.getElementById('unboxing-text').style.display = 'none';
                document.getElementById('result-toy-info').style.display = 'block';
                document.getElementById('restart-btn').style.display = 'block';
                if(camera) camera.stop(); 
            }, 1000); 
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
        hands.onResults(onResults);
    </script>
</body>
