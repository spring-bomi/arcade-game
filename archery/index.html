<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First-Person Archery</title>
    <style>
        body {
            margin: 0; overflow: hidden; background-color: #F5F7FA; color: #333;
            font-family: 'Noto Sans KR', 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; /* 고딕 폰트 */
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        #gameCanvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 2; }
        video { display: none; }
        
        #ui {
            position: absolute; top: 20px; left: 20px; z-index: 3; pointer-events: none;
        }
        #ui h2 { margin: 10px 0; font-size: 24px; font-weight: bold; }
        #comboText { color: #E53935; font-size: 20px; font-weight: bold; display: none; margin-top: 5px; }
        #powerupText { color: #1E88E5; font-size: 18px; font-weight: bold; margin-top: 10px; display: none; }
        
        #timeBoard {
            position: absolute; top: 20px; right: 20px; z-index: 3;
            font-size: 32px; font-weight: bold; color: #2E7D32;
        }

        #loading, #gameOverUI {
            position: absolute; z-index: 4; font-size: 20px; text-align: center;
            background-color: #FFFFFF; padding: 40px; border: 2px solid #CCC;
            border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        #gameOverUI { display: none; }
        #gameOverUI h1 { color: #D32F2F; margin-bottom: 20px; font-size: 32px; }
        #restartBtn {
            font-family: inherit; margin-top: 20px; padding: 15px 30px; font-weight: bold;
            font-size: 18px; cursor: pointer; background: #1976D2; border: none; border-radius: 8px;
            color: white; transition: 0.2s; pointer-events: auto;
        }
        #restartBtn:hover { background: #1565C0; transform: translateY(-2px); }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="loading">시스템 초기화 중...<br><br>웹캠 권한을 허용해주세요.</div>
    
    <div id="ui">
        <h2>점수: <span id="score">0</span></h2>
        <div id="comboText"><span id="comboCount">0</span> 연속 명중! (x<span id="multiplier">1</span>)</div>
        <div id="powerupText">아이템 적용됨!</div>
    </div>
    
    <div id="timeBoard">남은 시간: <span id="timeLeft">60</span></div>

    <div id="gameOverUI">
        <h1>게임 종료</h1>
        <p>최종 점수<br><br><span id="finalScore" style="color:#1976D2; font-size:48px; font-weight:bold;">0</span></p>
        <button id="restartBtn">다시 시작하기</button>
    </div>

    <video id="webcam" autoplay playsinline></video>
    <canvas id="gameCanvas"></canvas>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('gameCanvas');
        const ctx = canvasElement.getContext('2d');
        let width = window.innerWidth, height = window.innerHeight;
        canvasElement.width = width; canvasElement.height = height;

        window.addEventListener('resize', () => { width = window.innerWidth; height = window.innerHeight; canvasElement.width = width; canvasElement.height = height; });

        // 게임 상태
        const state = {
            aimPos: { x: width / 2, y: height / 2 },
            isPinching: false,
            leftHandDetected: false,
            score: 0, time: 60, isGameOver: false,
            combo: 0, multiplier: 1,
            powerup: null, powerupTimer: 0,
            lastFrameTime: performance.now(),
            arrows: [], targets: [], floatingTexts: []
        };

        const bowCenter = { x: width / 2, y: height };

        // --- 헬퍼 함수 ---
        const dist = (p1, p2) => Math.hypot(p1.x - p2.x, p1.y - p2.y);
        
        function updateUI() {
            document.getElementById('score').innerText = state.score;
            document.getElementById('timeLeft').innerText = Math.ceil(state.time);
            document.getElementById('comboCount').innerText = state.combo;
            document.getElementById('multiplier').innerText = state.multiplier;
            
            document.getElementById('comboText').style.display = state.combo > 1 ? 'block' : 'none';
            document.getElementById('powerupText').style.display = state.powerup ? 'block' : 'none';
            if(state.powerup) document.getElementById('powerupText').innerText = state.powerup === 'multi' ? '🔥 3갈래 화살!' : '⏱️ 적중 시간 지연!';
        }

        function spawnTarget() {
            const r = Math.random();
            let type = 'normal';
            let radius = 40 + Math.random() * 20;
            let hp = 1;
            
            if (r < 0.1) type = 'gold'; 
            else if (r < 0.25) type = 'penalty'; 
            else if (r < 0.30) { type = 'boss'; radius = 80; hp = 3; } 

            state.targets.push({
                x: Math.random() * (width - 200) + 100,
                y: -100,
                vx: (Math.random() - 0.5) * 3,
                vy: Math.random() * 2 + 1.5,
                radius: radius, type: type, hp: hp
            });
        }

        function createText(x, y, text, color) {
            state.floatingTexts.push({ x, y, text, color, life: 1.0, vy: -1.5 });
        }

        // --- 화살 발사 로직 (오른손 핀치를 풀었을 때) ---
        function fireArrow() {
            if (!state.leftHandDetected) return; // 조준점이 없을 때는 쏘지 않음

            const fireVec = { x: state.aimPos.x - bowCenter.x, y: state.aimPos.y - bowCenter.y };
            const m = Math.hypot(fireVec.x, fireVec.y);
            const speed = 35; // 화살 속도 (고정)

            const shots = state.powerup === 'multi' ? 3 : 1;
            for(let i=0; i<shots; i++) {
                let angleOffset = shots > 1 ? (i - 1) * 0.1 : 0;
                let cos = Math.cos(angleOffset), sin = Math.sin(angleOffset);
                let dirX = (fireVec.x / m), dirY = (fireVec.y / m);
                
                let rDirX = dirX * cos - dirY * sin;
                let rDirY = dirX * sin + dirY * cos;

                state.arrows.push({ 
                    x: bowCenter.x, y: bowCenter.y - 50, 
                    vx: rDirX * speed, vy: rDirY * speed, 
                    life: 100 
                });
            }
        }

        // --- 메인 렌더링 루프 ---
        function gameLoop(now) {
            if (state.isGameOver) return;
            requestAnimationFrame(gameLoop);

            const dt = (now - state.lastFrameTime) / 1000;
            state.lastFrameTime = now;

            state.time -= dt;
            if (state.time <= 0) endGame();
            if (state.powerup) {
                state.powerupTimer -= dt;
                if (state.powerupTimer <= 0) state.powerup = null;
            }

            if (Math.random() < 0.02) spawnTarget();

            ctx.clearRect(0, 0, width, height);

            // 1. 과녁 그리기 (밝고 깔끔한 색상)
            let timeScale = state.powerup === 'slow' ? 0.3 : 1.0;
            for (let i = state.targets.length - 1; i >= 0; i--) {
                let t = state.targets[i];
                t.x += t.vx * timeScale;
                t.y += t.vy * timeScale;

                if (t.y > height + 100) {
                    if (t.type === 'normal' || t.type === 'boss') state.combo = 0; 
                    state.targets.splice(i, 1);
                    continue;
                }

                ctx.beginPath(); ctx.arc(t.x, t.y, t.radius, 0, Math.PI * 2);
                if(t.type === 'normal') { ctx.fillStyle = '#FFFFFF'; ctx.fill(); ctx.lineWidth = 4; ctx.strokeStyle = '#D32F2F'; ctx.stroke(); }
                else if(t.type === 'penalty') { ctx.fillStyle = '#424242'; ctx.fill(); ctx.lineWidth = 4; ctx.strokeStyle = '#212121'; ctx.stroke(); }
                else if(t.type === 'gold') { ctx.fillStyle = '#FFF176'; ctx.fill(); ctx.lineWidth = 4; ctx.strokeStyle = '#FBC02D'; ctx.stroke(); }
                else if(t.type === 'boss') { ctx.fillStyle = '#B71C1C'; ctx.fill(); ctx.lineWidth = 6; ctx.strokeStyle = '#7F0000'; ctx.stroke(); }
                
                // 과녁 중앙점
                ctx.beginPath(); ctx.arc(t.x, t.y, t.radius * 0.3, 0, Math.PI * 2);
                ctx.fillStyle = (t.type === 'penalty') ? '#000' : (t.type === 'normal' ? '#D32F2F' : '#FFF');
                ctx.fill();
            }

            // 2. 화살 업데이트 및 충돌 검사
            for (let i = state.arrows.length - 1; i >= 0; i--) {
                let a = state.arrows[i];
                a.x += a.vx; a.y += a.vy; a.life--;

                if (a.life <= 0) { state.arrows.splice(i, 1); continue; }

                // 단순한 직선 화살
                ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(a.x - a.vx, a.y - a.vy);
                ctx.strokeStyle = '#333'; ctx.lineWidth = 4; ctx.stroke();

                let hitTarget = false;
                for (let j = state.targets.length - 1; j >= 0; j--) {
                    let t = state.targets[j];
                    let d = dist(a, t);
                    
                    if (d < t.radius) {
                        hitTarget = true;
                        if (t.type === 'boss') {
                            t.hp--;
                            if (t.hp > 0) break;
                        }

                        if (t.type === 'penalty') {
                            state.score = Math.max(0, state.score - 500);
                            state.time -= 3; state.combo = 0; state.multiplier = 1;
                            createText(t.x, t.y, "-500 & -3초", "#D32F2F");
                        } else {
                            let isPerfect = d < t.radius * 0.3;
                            let baseScore = t.type === 'boss' ? 1000 : (t.type === 'gold' ? 500 : 100);
                            
                            state.combo++;
                            state.multiplier = Math.min(5, 1 + Math.floor(state.combo / 5));
                            let finalScore = baseScore * state.multiplier * (isPerfect ? 2 : 1);
                            
                            state.score += finalScore;
                            state.time = Math.min(60, state.time + 1.5);
                            
                            createText(t.x, t.y, (isPerfect ? "정확함! " : "") + "+" + finalScore, "#1976D2");

                            if (t.type === 'gold') {
                                state.powerup = Math.random() > 0.5 ? 'multi' : 'slow';
                                state.powerupTimer = 5;
                            }
                        }
                        state.targets.splice(j, 1);
                        break;
                    }
                }
                if (hitTarget) state.arrows.splice(i, 1);
            }

            // 3. 플로팅 텍스트
            for(let i=state.floatingTexts.length-1; i>=0; i--) {
                let ft = state.floatingTexts[i];
                ft.y += ft.vy; ft.life -= 0.02;
                if(ft.life <= 0) { state.floatingTexts.splice(i, 1); continue; }
                ctx.globalAlpha = ft.life; ctx.fillStyle = ft.color; ctx.font = "bold 20px sans-serif";
                ctx.fillText(ft.text, ft.x, ft.y);
            }
            ctx.globalAlpha = 1.0;

            // 4. 고정된 1인칭 활 그리기 (하단 중앙)
            bowCenter.x = width / 2; bowCenter.y = height;
            const bowWidth = 200;
            const bowHeight = 250;

            ctx.beginPath();
            ctx.moveTo(bowCenter.x - bowWidth, bowCenter.y - bowHeight);
            ctx.quadraticCurveTo(bowCenter.x, bowCenter.y - 50, bowCenter.x + bowWidth, bowCenter.y - bowHeight);
            ctx.strokeStyle = '#8D6E63'; // 나무 색상
            ctx.lineWidth = 15;
            ctx.stroke();

            // 활 시위
            ctx.beginPath();
            ctx.moveTo(bowCenter.x - bowWidth, bowCenter.y - bowHeight);
            if (state.isPinching) {
                // 당겼을 때 시위가 아래로 내려옴
                ctx.lineTo(bowCenter.x, bowCenter.y - 50);
            } else {
                // 평상시 시위
                ctx.lineTo(bowCenter.x + bowWidth, bowCenter.y - bowHeight);
            }
            ctx.lineTo(bowCenter.x + bowWidth, bowCenter.y - bowHeight);
            ctx.strokeStyle = '#9E9E9E';
            ctx.lineWidth = 3;
            ctx.stroke();

            // 5. 왼손 조준선 (크로스헤어)
            if (state.leftHandDetected) {
                const ax = state.aimPos.x, ay = state.aimPos.y;
                ctx.beginPath(); ctx.arc(ax, ay, 20, 0, 2 * Math.PI);
                // 핀치 중일 때(집중 모드) 조준선이 빨갛게 변함
                ctx.strokeStyle = state.isPinching ? '#D32F2F' : '#1976D2'; 
                ctx.lineWidth = 4; ctx.stroke();
                
                ctx.beginPath(); 
                ctx.moveTo(ax - 30, ay); ctx.lineTo(ax - 10, ay); 
                ctx.moveTo(ax + 30, ay); ctx.lineTo(ax + 10, ay); 
                ctx.moveTo(ax, ay - 30); ctx.lineTo(ax, ay - 10); 
                ctx.moveTo(ax, ay + 30); ctx.lineTo(ax, ay + 10); 
                ctx.stroke();

                // 핀치 중일 때 조준선에서 활로 이어지는 가이드라인 (옵션)
                if (state.isPinching) {
                    ctx.beginPath();
                    ctx.moveTo(bowCenter.x, bowCenter.y - 50);
                    ctx.lineTo(ax, ay);
                    ctx.strokeStyle = 'rgba(211, 47, 47, 0.2)';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([10, 10]);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
            }

            updateUI();
        }

        // --- MediaPipe 핸드 트래킹 ---
        function onResults(results) {
            document.getElementById('loading').style.display = 'none';
            if (state.isGameOver) return;

            let leftHand = null, rightHand = null;
            state.leftHandDetected = false;

            if (results.multiHandLandmarks) {
                results.multiHandLandmarks.forEach((landmarks, index) => {
                    const label = results.multiHandedness[index].label;
                    const x = (1 - landmarks[9].x) * width; const y = landmarks[9].y * height;

                    if (label === 'Right') { leftHand = { x, y }; } 
                    else { rightHand = landmarks; }
                });
            }

            // 왼손 (조준선 이동)
            if (leftHand) {
                state.leftHandDetected = true;
                state.aimPos.x += (leftHand.x - state.aimPos.x) * 0.4;
                state.aimPos.y += (leftHand.y - state.aimPos.y) * 0.4;
            }

            // 오른손 (핀치 발사)
            if (rightHand) {
                const rThumb = { x: (1 - rightHand[4].x) * width, y: rightHand[4].y * height };
                const rIndex = { x: (1 - rightHand[8].x) * width, y: rightHand[8].y * height };
                
                const isCurrentlyPinching = dist(rThumb, rIndex) < 40;

                if (isCurrentlyPinching && !state.isPinching) {
                    state.isPinching = true; // 시위 당기기 시작
                } else if (!isCurrentlyPinching && state.isPinching) {
                    state.isPinching = false; // 시위 놓기
                    fireArrow(); 
                }
            } else {
                state.isPinching = false;
            }
        }

        function endGame() {
            state.isGameOver = true;
            document.getElementById('finalScore').innerText = state.score;
            document.getElementById('gameOverUI').style.display = 'block';
        }

        document.getElementById('restartBtn').addEventListener('click', () => {
            state.score = 0; state.time = 60; state.combo = 0; state.multiplier = 1;
            state.arrows = []; state.targets = []; state.floatingTexts = [];
            state.powerup = null; state.isGameOver = false;
            state.lastFrameTime = performance.now();
            document.getElementById('gameOverUI').style.display = 'none';
            requestAnimationFrame(gameLoop);
        });

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });
        hands.onResults(onResults);

        const camera = new Camera(videoElement, { onFrame: async () => { await hands.send({image: videoElement}); }, width: 640, height: 480 });
        camera.start();

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
